name: Update VJ Artist Index

on:
  push:
    paths:
      - 'audio/vj_artists/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate artist index
        run: |
          ls audio/vj_artists/ \
            | grep '\.ogg$' \
            | sed 's/\.ogg$//' \
            | sort \
            > audio/vj_artists_index.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/vj_artists_index.txt
          git diff --staged --quiet || git commit -m "Auto-update VJ artist index"
          git push
